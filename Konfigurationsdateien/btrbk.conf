# ==============================================================================
# Btrbk Konfigurationsdatei für systemweite Backups
# ==============================================================================
# Dieses Backup-Schema sichert das Root- und Home-Dateisystem auf eine
# LUKS-verschlüsselte Btrfs-Backup-Festplatte.
#
# WICHTIG: Die verschlüsselte Festplatte muss entschlüsselt und unter
# /mnt/snapshots_archiv eingehängt sein, bevor btrbk ausgeführt wird.
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. Globale Einstellungen
# ------------------------------------------------------------------------------

# Pfad für die Protokollierung von Aktionen
transaction_log            /var/log/btrbk.log

# Stellt sicher, dass nur eine Instanz von btrbk gleichzeitig läuft
lockfile                   /var/lock/btrbk.lock

# Nutzt mbuffer (falls installiert) zur Optimierung des send/receive-Datenstroms
stream_buffer              256m

# Standardmäßig werden Backups nur erstellt, wenn das Ziellaufwerk erreichbar ist.
# "ondemand" sorgt dafür, dass keine lokalen Snapshots verwaist angesammelt werden,
# wenn die externe Festplatte nicht angeschlossen oder entschlüsselt ist.
snapshot_create            ondemand

# ------------------------------------------------------------------------------
# 2. Aufbewahrungsrichtlinien (Retention Policy)
# ------------------------------------------------------------------------------

# Lokale Snapshots (auf der Quelle)
# Wir behalten lokale Snapshots für mindestens 2 Tage und heben maximal 14 Tage auf.
snapshot_preserve_min      2d
snapshot_preserve          14d

# Ziel-Backups (auf der Backup-Festplatte /dev/sdg)
# Wir behalten keine Mindestanzahl, sichern aber nach folgendem Schema:
# - Die letzten 14 täglichen Backups
# - Die letzten 8 wöchentlichen Backups
# - Die letzten 12 monatlichen Backups
# - Alle jährlichen Backups unbegrenzt (*)
target_preserve_min        no
target_preserve            14d 8w 12m *y

# ------------------------------------------------------------------------------
# 3. Backup-Ziel (LUKS-verschlüsselte externe Festplatte)
# ------------------------------------------------------------------------------
# Hier wird das eingehängte Verzeichnis des entschlüsselten LUKS-Laufwerks angegeben.
target                     /mnt/snapshots_archiv

# ------------------------------------------------------------------------------
# 4. Quellen (Subvolumes, die gesichert werden sollen)
# ------------------------------------------------------------------------------

# QUELLE A: Root-Dateisystem (/)
# Da / in der fstab als Subvolume "@" eingehängt ist, definieren wir den Mountpoint:
subvolume                  /
  # Der Pfad, in dem btrbk seine temporären lokalen Snapshots speichert.
  # Dies muss auf demselben Btrfs-Dateisystem wie die Quelle liegen.
  # HINWEIS: Dieses Verzeichnis muss manuell angelegt werden (z. B. sudo mkdir /.snapshots_btrbk).
  snapshot_dir             /.snapshots_btrbk

# QUELLE B: Home-Dateisystem (/home)
# Da /home auf einem separaten RAID0-Btrfs-Dateisystem (Subvolume "@home") liegt,
# müssen die Snapshots zwingend auf diesem RAID0-Dateisystem gespeichert werden.
subvolume                  /home
  # HINWEIS: Dieses Verzeichnis muss manuell angelegt werden (z. B. sudo mkdir /home/.snapshots_btrbk).
  snapshot_dir             /home/.snapshots_btrbk

